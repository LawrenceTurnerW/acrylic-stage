# =============================================================================
# Acrylic Stage - 戦闘実況テキスト
# =============================================================================
# キャラ別の戦闘実況セリフ集(合計49件)。
# - 通常攻撃時: 各キャラ 3パターン
# - 必殺技発動時: 各キャラ 2パターン
# - 戦闘不能時: 各キャラ 2パターン
#
# 味付けは「中」レベル: ユニットの音楽性に寄せる程度。
# 本人の固有口癖・方言・特定ネタは入れない。
# =============================================================================

# 共通システムメッセージ(キャラ非依存)
system:
  battle_start:
    - "ライブ、スタート!"
    - "ステージインです!"
  victory:
    - "大成功!観客の歓声が鳴り止まない!"
    - "完璧なライブだった!"
  defeat:
    - "ステージが暗転していく..."
    - "今日は、ここまで..."
  warning_attack_announce:
    front_blast_t2: "⚠ 2ターン後:前列爆撃!"
    front_blast_t1: "⚠ 残り1ターン!前列を後ろへ!"
    rear_snipe_t2: "⚠ 2ターン後:後列狙撃!"
    rear_snipe_t1: "⚠ 残り1ターン!後列を前へ!"
    safe: "ヒュー...セーフ!観客の歓声!"

# キャラ別セリフ
# 各キャラ7パターン: 通常攻撃3 + 必殺技2 + 戦闘不能2
# テンプレートで `{target}` `{damage}` 等の変数を使用可能

characters:

  # ──────────────────────────────────────────────────────
  # 七海ロナ (RouteHeart / 光) - 王道アイドル、明るく前向き
  # ──────────────────────────────────────────────────────
  nanami_rona:
    normal_attack:
      - "みんな、一緒に光を届けよう!"
      - "輝きを、ステージいっぱいに!"
      - "声援が、わたしの力!"
    ultimate:
      - "ハートビート・オーロラ!全部、わたしに任せて!"
      - "みんなの想いを、虹色の光に変えて——ハートビート・オーロラ!"
    downed:
      - "ごめん、わたし...ここまでかも..."
      - "みんな、後はお願い..."

  # ──────────────────────────────────────────────────────
  # 藤宮コトハ (RouteHeart / 音) - 王道アイドル、優しく可愛らしい
  # ──────────────────────────────────────────────────────
  fujimiya_kotoha:
    normal_attack:
      - "素敵な歌を、響かせて♪"
      - "わたしの音、届け!"
      - "みんな、一緒に歌おう!"
    ultimate:
      - "セレナーデ・コール!みんなに、勇気の歌を!"
      - "わたしの声、みんなの背中を押すから——セレナーデ・コール!"
    downed:
      - "あ...歌が、続かない..."
      - "もう少し、頑張りたかった..."

  # ──────────────────────────────────────────────────────
  # 江波キョウカ (REGALILIA / 炎) - メタル系、熱血で激しめ
  # ──────────────────────────────────────────────────────
  enami_kyouka:
    normal_attack:
      - "炎よ吼えろ!ぶち抜いてやる!"
      - "燃え尽きるまで撃ち抜くぜ!"
      - "音圧、ぶちかますよ!"
    ultimate:
      - "ブレイズ・アンセム!吹き飛べ——!"
      - "全力全開!炎の咆哮、受けてみろ——ブレイズ・アンセム!"
    downed:
      - "クソッ...まだ、燃え尽きてないのに..."
      - "ステージは...まだ、続く..."

  # ──────────────────────────────────────────────────────
  # 鬼多見アユム (REGALILIA / 闇) - メタル系、クールで挑発的
  # ──────────────────────────────────────────────────────
  kitami_ayumu:
    normal_attack:
      - "闇に堕ちろ。それがお前の運命だ。"
      - "ふっ、避けられるかな?"
      - "終わらせてやる、一瞬で。"
    ultimate:
      - "ナイトトリック・ステップ。さあ、踊ろうか——"
      - "影は欺き、闇は裂く——ナイトトリック・ステップ。"
    downed:
      - "...悪くなかった、ぜ..."
      - "次は、もっと深く堕としてやる..."

  # ──────────────────────────────────────────────────────
  # 暁月クララ (Sputrip / 氷) - シティポップ系、洗練されてアンニュイ
  # ──────────────────────────────────────────────────────
  akatsuki_clara:
    normal_attack:
      - "夜風みたいに、凍らせるよ。"
      - "ふぅ...冷たい音、響かせるね。"
      - "ステージは、わたしの色に染めるから。"
    ultimate:
      - "フローズン・ステージ。全部、止まってよ。"
      - "ねえ、世界を一瞬だけ凍らせよっか——フローズン・ステージ。"
    downed:
      - "ふぅ...ちょっと、休憩、かな..."
      - "また、夜に会いましょう..."

  # ──────────────────────────────────────────────────────
  # 常磐カナメ (Sputrip / 風) - シティポップ系、しなやかでミステリアス
  # ──────────────────────────────────────────────────────
  tokiwa_kaname:
    normal_attack:
      - "ふっ、風よ駆け抜けて。"
      - "捉えてみせて、わたしを。"
      - "リズム、刻むよ。"
    ultimate:
      - "ブリーズ・タップステップ。一、二、三——!"
      - "風の歌、聴こえる?——ブリーズ・タップステップ。"
    downed:
      - "風が、止んだみたい..."
      - "また、舞うから..."

  # ──────────────────────────────────────────────────────
  # 香鳴ハノン (Sputrip / 水) - シティポップ系、ムーディーで艶っぽい
  # ──────────────────────────────────────────────────────
  kanaru_hanon:
    normal_attack:
      - "ナイトクルーズの始まりよ。"
      - "夜の水面、揺らしてあげる。"
      - "甘い夢、見せてあげるね。"
    ultimate:
      - "アクア・ミラージュ。夜の水面に、堕ちて。"
      - "蜃気楼、解いてあげる——アクア・ミラージュ。"
    downed:
      - "あら...今夜は、ここまで..."
      - "夢の続きは、また今度ね..."
